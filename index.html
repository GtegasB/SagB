    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'], // Inter como padrão global (Apple-like)
              nunito: ['Nunito Sans', 'sans-serif'],
            },
            colors: {
              bitrix: {
                nav: '#111827', // Dark Gray (Quase preto, mais elegante que Teal)
                accent: '#7C3AED', // Vivid Violet (Moderno)
                text: '#1F2937', // Gray 800
                secondary: '#6B7280',
                border: '#E5E7EB',
                surface: '#FFFFFF'
              }
            },
            boxShadow: {
              'soft': '0 2px 10px rgba(0, 0, 0, 0.03)',
              'hover': '0 20px 40px rgba(0, 0, 0, 0.04)',
            }
          },
        },

    <style>
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #D1D5DB; }
      
      body { 
        -webkit-font-smoothing: antialiased; 
        -moz-osx-font-smoothing: grayscale;
        background-color: #F9FAFB; /* Gray 50 - Pure Clean Base */
        color: #1F2937;
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-msg {
        animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .prose {
        max-width: none;
      }
      .prose p { margin-bottom: 0.75rem; line-height: 1.7; }
      .prose strong { color: #111827; font-weight: 600; }
      
      /* Smooth Inputs */
      input, textarea, select {
        transition: all 0.2s ease;
      }
      input:focus, textarea:focus, select:focus {
        box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.1);
      }
    </style>
